spring:
  application:
    name: sensitive-words-service

  profiles:
    group:
      local:
        - local
      test:
        - test
      prod:
        - prod

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: sw
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    za.co.assessment.sensitivewords: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"

sensitive-words:
  retry:
    max-attempts: 3
    backoff-ms: 150
