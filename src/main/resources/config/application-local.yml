server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: "${DB_URL:jdbc:sqlserver://localhost:14333;databaseName=SensitiveWordsDb;encrypt=true;trustServerCertificate=true}"
    username: "${DB_USERNAME:sensitive_words_app}"
    password: "${DB_PASSWORD:SwApp.Local#2026}"
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      pool-name: SensitiveWordsHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        default_schema: sw
        format_sql: true

sensitive-words:
  security:
    basic:
      username: local
      password: local
