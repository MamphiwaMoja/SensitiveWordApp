server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SensitiveWordsDevDb;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME:sensitive_words_app}
    password: ${DB_PASSWORD:ChangeMe!12345}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      pool-name: SensitiveWordsDevHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    show-sql: ${JPA_SHOW_SQL:false}

logging:
  level:
    za.co.assessment.sensitivewords: ${APP_LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:WARN}

sensitive-words:
  security:
    basic:
      username: ${SECURITY_BASIC_USERNAME:sensitive-words-dev}
      password: ${SECURITY_BASIC_PASSWORD:}
      role: ${SECURITY_BASIC_ROLE:API_USER}
