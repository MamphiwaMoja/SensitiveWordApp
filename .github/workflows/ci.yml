name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  JAVA_VERSION: "17"
  IMAGE_NAME: sensitive-words-service

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile
        run: mvn -B -ntp clean compile

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: compile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Maven verification with SQL Server Testcontainers
        run: mvn -B -ntp clean verify

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: compile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          build-mode: manual
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: mvn -B -ntp -DskipTests compile

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4

  dependency-vulnerability-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: compile
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check
          key: dependency-check-v3-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dependency-check-v3-${{ runner.os }}-

      - name: Review dependency changes
        if: ${{ github.event_name == 'pull_request' && github.event.repository.private == false }}
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

      - name: Check NVD API key availability
        shell: bash
        run: |
          if [[ -n "${NVD_API_KEY}" ]]; then
            echo "NVD_API_KEY is configured."
          else
            echo "::warning::NVD_API_KEY is missing or unavailable. Dependency-Check may be slow or rate-limited by NVD."
          fi

      - name: Scan dependencies with OWASP Dependency-Check
        shell: bash
        run: |
          args=(
            "org.owasp:dependency-check-maven:12.2.2:check"
            "-DfailBuildOnCVSS=7"
            "-DfailOnError=false"
            "-Dformats=HTML,JSON"
            "-DdataDirectory=$HOME/.dependency-check"
            "-DnvdMaxRetryCount=20"
            "-DnvdValidForHours=24"
          )

          if [[ -n "${NVD_API_KEY}" ]]; then
            echo "Running Dependency-Check with NVD API key."
            args+=(
              "-DnvdApiKey=${NVD_API_KEY}"
              "-DnvdApiDelay=6000"
            )
          else
            echo "Running Dependency-Check without NVD API key. This may be slower and may hit NVD rate limits."
            args+=("-DnvdApiDelay=12000")
          fi

          mvn -B -ntp "${args[@]}"

      - name: Upload dependency scan report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          if-no-files-found: ignore

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - integration-tests
      - static-analysis
      - dependency-vulnerability-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max