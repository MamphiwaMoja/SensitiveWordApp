services:
  db:
    build:
      context: .
      dockerfile: docker/sqlserver/Dockerfile
    container_name: sensitive-words-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  db-init:
    build:
      context: .
      dockerfile: docker/sqlserver/Dockerfile
    container_name: sensitive-words-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: "db"
      SA_PASSWORD: "YourStrong!Passw0rd"
    entrypoint: ["/bin/bash", "/usr/local/bin/init-db.sh"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sensitive-words-app
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: "local"
      DB_URL: "jdbc:sqlserver://db:1433;databaseName=SensitiveWordsDb;encrypt=true;trustServerCertificate=true"
      DB_USERNAME: "sensitive_words_app"
      DB_PASSWORD: "ChangeMe!12345"
    ports:
      - "8080:8080"

